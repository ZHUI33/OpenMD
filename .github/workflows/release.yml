name: Build release artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: dist:win
            artifact: windows-x64
          - name: macOS x64 and arm64
            os: macos-latest
            command: dist:mac
            artifact: macos-x64-arm64
    runs-on: ${{ matrix.os }}
    env:
      MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build unsigned ${{ matrix.name }}
        if: >-
          (runner.os == 'macOS' && env.MACOS_CSC_LINK == '') ||
          (runner.os == 'Windows' && env.WINDOWS_CSC_LINK == '')
        run: pnpm ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Build signed Windows x64
        if: runner.os == 'Windows' && env.WINDOWS_CSC_LINK != ''
        run: pnpm ${{ matrix.command }}
        env:
          CSC_LINK: ${{ env.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      - name: Build signed macOS x64 and arm64
        if: runner.os == 'macOS' && env.MACOS_CSC_LINK != ''
        run: pnpm ${{ matrix.command }}
        env:
          CSC_LINK: ${{ env.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmd-${{ matrix.artifact }}-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: error

  release:
    name: Create draft release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openmd-*-${{ github.ref_name }}
          path: dist
          merge-multiple: true
      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: OpenMD ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
