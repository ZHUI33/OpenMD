name: Build release artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: dist:win
            artifact: windows-x64
          - name: macOS x64 and arm64
            os: macos-latest
            command: dist:mac
            artifact: macos-x64-arm64
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_LINK: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_LINK || secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || secrets.WINDOWS_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: openmd-${{ matrix.artifact }}-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap
